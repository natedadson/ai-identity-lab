<!DOCTYPE html>
<html>
<head>
    <title>SOD Violation Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #0066cc; }
        .violation-card {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
        }
        .risk-Critical { border-left-color: #dc3545; background: #fff5f5; }
        .risk-High { border-left-color: #fd7e14; background: #fff8f0; }
        .risk-Medium { border-left-color: #ffc107; background: #fffcf0; }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-critical { background: #dc3545; color: white; }
        .badge-high { background: #fd7e14; color: white; }
        .badge-medium { background: #ffc107; color: black; }
        .entitlement {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 2px;
            font-size: 11px;
        }
        .stats {
            display: inline-block;
            padding: 20px;
            text-align: center;
            background: #0066cc;
            color: white;
            border-radius: 8px;
            margin: 10px;
            min-width: 150px;
        }
        .stats-number { font-size: 36px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Segregation of Duties (SOD) Violation Dashboard</h1>
        <p>Real-time detection of toxic entitlement combinations</p>
        
        <div style="display: flex; justify-content: space-around; margin: 20px 0;">
            <div class="stats">
                <div class="stats-number" id="totalViolations">0</div>
                <div>Total Violations</div>
            </div>
            <div class="stats">
                <div class="stats-number" id="affectedUsers">0</div>
                <div>Affected Users</div>
            </div>
            <div class="stats">
                <div class="stats-number" id="criticalCount">0</div>
                <div>Critical Violations</div>
            </div>
        </div>
        
        <div id="violations-container"></div>
    </div>

    <script>
        // Sample violation data (will be replaced with real data from your scan)
        const violations = [
            {
                "user_id": "user_0099",
                "rule_name": "Vendor Management Fraud",
                "risk_level": "Critical",
                "entitlements_found": ["create_vendor", "approve_payment"],
                "business_process": "Accounts Payable",
                "mitigation": "Require two-person approval for vendors over $10,000"
            },
            {
                "user_id": "user_0142",
                "rule_name": "Payroll Fraud",
                "risk_level": "Critical",
                "entitlements_found": ["view_salary", "edit_salary"],
                "business_process": "HR/Payroll",
                "mitigation": "Separate HR and Payroll roles"
            },
            {
                "user_id": "user_0231",
                "rule_name": "Expense Reimbursement Fraud",
                "risk_level": "High",
                "entitlements_found": ["submit_expense", "approve_expense"],
                "business_process": "Finance",
                "mitigation": "Manager approval required for expenses"
            }
        ];
        
        // Update stats
        document.getElementById('totalViolations').innerText = violations.length;
        document.getElementById('affectedUsers').innerText = new Set(violations.map(v => v.user_id)).size;
        document.getElementById('criticalCount').innerText = violations.filter(v => v.risk_level === 'Critical').length;
        
        const container = document.getElementById('violations-container');
        
        violations.forEach(violation => {
            const card = document.createElement('div');
            card.className = `violation-card risk-${violation.risk_level}`;
            
            card.innerHTML = `
                <h3>⚠️ ${violation.rule_name} <span class="badge badge-${violation.risk_level.toLowerCase()}">${violation.risk_level}</span></h3>
                <p><strong>User:</strong> ${violation.user_id}</p>
                <p><strong>Business Process:</strong> ${violation.business_process}</p>
                <p><strong>Conflicting Entitlements:</strong></p>
                <div>
                    ${violation.entitlements_found.map(e => `<span class="entitlement">${e}</span>`).join('')}
                </div>
                <p><strong>Remediation:</strong> ${violation.mitigation}</p>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
